<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acompanhamento do projeto solar</title>
  <style>
    :root{--bg:#071421;--text:#10273d;--muted:#65768a;--primary:#ffb703;--green:#168a56;--blue:#25a5bd;--line:#d9e4ef;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#071421,#102b46);color:#fff}.shell{max-width:1050px;margin:auto;padding:34px 18px}.hero{background:linear-gradient(135deg,rgba(255,183,3,.18),rgba(37,165,189,.12)),#102b46;border:1px solid rgba(255,255,255,.16);border-radius:32px;padding:34px;box-shadow:0 26px 80px rgba(0,0,0,.24)}.kicker{display:inline-flex;height:30px;padding:0 14px;align-items:center;border-radius:999px;background:#fff4d3;color:#8a6500;text-transform:uppercase;font-size:12px;font-weight:900;letter-spacing:.06em}.hero h1{margin:18px 0 10px;font-size:44px;line-height:1;letter-spacing:-.06em}.hero p{margin:0;color:#dceaf7;font-size:18px;line-height:1.5;max-width:760px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:20px}.card{background:#fff;color:var(--text);border-radius:26px;border:1px solid var(--line);padding:24px;box-shadow:0 18px 55px rgba(0,0,0,.16)}.card h2{margin:0 0 16px;font-size:26px;letter-spacing:-.04em}.detail{display:grid;grid-template-columns:1fr 1fr;gap:12px}.item{background:#f7fafd;border:1px solid var(--line);border-radius:16px;padding:14px}.item span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;font-weight:900}.item strong{display:block;margin-top:5px;font-size:20px}.track{display:grid;gap:10px}.step{display:grid;grid-template-columns:36px 1fr;gap:12px;align-items:start}.dot{width:36px;height:36px;border-radius:999px;background:#dce7f1;color:#65768a;display:grid;place-items:center;font-weight:900}.step.done .dot,.step.current .dot{background:var(--primary);color:#10273d}.step.current strong{color:#10273d}.step span{color:var(--muted);font-size:14px}.msg{padding:16px;border-radius:18px;background:#fff4d3;color:#705200;margin-top:16px;font-weight:800}.footer{margin-top:20px;color:#c6d7e7;text-align:center;font-size:14px}@media(max-width:760px){.grid,.detail{grid-template-columns:1fr}.hero h1{font-size:34px}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <span class="kicker">Portal do cliente</span>
      <h1 id="welcomeTitle">Bem-vindo ao seu projeto solar.</h1>
      <p id="welcomeText">Aqui você acompanha as principais etapas após a aprovação da proposta.</p>
    </section>
    <section class="grid">
      <div class="card"><h2>Dados do projeto</h2><div id="details" class="detail"></div><div id="message" class="msg" style="display:none"></div></div>
      <div class="card"><h2>Linha do tempo</h2><div id="track" class="track"></div></div>
    </section>
    <div class="footer">Acompanhamento online do projeto · Atualizado pela equipe responsável</div>
  </main>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js';
    const firebaseConfig={"apiKey":"AIzaSyCYSQfnPLyV9B6osiZhsLYYrF64YLhGkMA","authDomain":"energiasolar-67b14.firebaseapp.com","databaseURL":"https://energiasolar-67b14-default-rtdb.firebaseio.com","projectId":"energiasolar-67b14","storageBucket":"energiasolar-67b14.firebasestorage.app","messagingSenderId":"394822890491","appId":"1:394822890491:web:5afc55e01902bbf142915e"};
    const app=initializeApp(firebaseConfig);const db=getFirestore(app);const params=new URLSearchParams(location.search);const cpf=onlyDigits(params.get('cpf')||'');const proposal=params.get('proposal')||'';const stages=['Projeto','Homologação','Compras','Instalação','Vistoria','Troca do medidor','Operação'];
    const $=id=>document.getElementById(id);function onlyDigits(v=''){return String(v||'').replace(/\D/g,'')}function maskDoc(v=''){const d=onlyDigits(v);if(d.length===11)return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');if(d.length===14)return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');return v||''}function item(k,v){return `<div class="item"><span>${k}</span><strong>${v||'—'}</strong></div>`}
    async function load(){let data=null;if(cpf){try{const snap=await getDoc(doc(db,'client_project_status',cpf));if(snap.exists())data={id:snap.id,...snap.data()}}catch(e){console.warn(e)}}
      if(!data)data={cpf,proposalId:proposal,clientName:'Cliente',projectStage:'Projeto',progress:10,status:'Bem-vindo ao acompanhamento',publicMessage:'Sua proposta foi aceita. Em breve nossa equipe atualizará as próximas etapas.'};
      if(params.get('welcome')){$('welcomeTitle').textContent=`Bem-vindo, ${data.clientName||'cliente'}!`;$('welcomeText').textContent='Sua proposta foi aceita. A partir de agora, este será o canal para acompanhar a evolução do projeto.'}
      $('details').innerHTML=item('Cliente',data.clientName)+item('CPF/CNPJ',maskDoc(data.cpf||cpf))+item('Proposta',data.proposalId||proposal)+item('Cidade',data.city)+item('Potência',data.systemPower?`${Number(data.systemPower).toLocaleString('pt-BR')} kWp`:'—')+item('Progresso',`${Number(data.progress||0)}%`);
      if(data.publicMessage){$('message').style.display='block';$('message').textContent=data.publicMessage}
      const current=stages.indexOf(data.projectStage||'Projeto');$('track').innerHTML=stages.map((s,i)=>`<div class="step ${i<current?'done':i===current?'current':''}"><div class="dot">${i<current?'✓':i+1}</div><div><strong>${s}</strong><span>${i===current?'Etapa atual do seu projeto.':i<current?'Etapa concluída.':'Próxima etapa.'}</span></div></div>`).join('');
    }load();
  </script>
</body>
</html>
